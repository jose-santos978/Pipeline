on:
  push:
    branches:
      -main

jobs:

  build:
    runs-on: ubuntu-latest
    
  steps:
  - name: Checkout código
    uses: actions/checkout@v3


  - name: Configurar Python
    uses: actions/checkout@v4
    with:
      python-version.'3.11'

  - name: Instalar depêndencias
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt 

  - name: Rodar testes
    run: pytest

